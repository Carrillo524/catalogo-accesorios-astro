backend:
  name: git-gateway
  branch: main # Cambia a "master" si tu rama principal en GitHub se llama así

# Dónde el cliente subirá las fotos y cómo se leerán en el código
media_folder: "public/imagenes"
public_folder: "/imagenes"

collections:
  - name: "productos"
    label: "Productos del Catálogo"
    folder: "src/content/productos" # Dónde se guardan los archivos Markdown
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Referencia (Opcional)", name: "referencia", widget: "string", required: false }
      - { label: "Nombre del Producto", name: "nombre", widget: "string" }
      - { label: "Descripción Breve", name: "descripcionBreve", widget: "string" }
      - { label: "Precio (En números, sin puntos)", name: "precio", widget: "number", value_type: "int" }
      - { label: "Imagen Principal", name: "imagen", widget: "image" }
      - { label: "Galería de Imágenes Extras", name: "galeria", widget: "list", field: { label: "Foto", name: "foto", widget: "image" }, required: false }
      - { label: "Estado actual", name: "estado", widget: "select", options: ["disponible", "agotado"] }
      - { label: "Descripción Larga Completa", name: "body", widget: "markdown" }